<svg width="800" height="720" viewBox="0 0 800 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="720" fill="#ffffff" rx="0"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Local AI DBA Assistant — Architecture Overview</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6b6b6b">100% private · no internet · no cloud · no tokens</text>

  <!-- Laptop container -->
  <rect x="30" y="74" width="740" height="590" rx="16" fill="#f8f8f6" stroke="#d0cec6" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="56" y="98" font-size="11" fill="#888780">Your laptop — nothing leaves this machine</text>

  <!-- Privacy badges top right -->
  <rect x="560" y="82" width="90" height="22" rx="11" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="1"/>
  <text x="605" y="97" text-anchor="middle" font-size="10" font-weight="500" fill="#0f6e56">No internet</text>
  <rect x="660" y="82" width="90" height="22" rx="11" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="1"/>
  <text x="705" y="97" text-anchor="middle" font-size="10" font-weight="500" fill="#0f6e56">Zero tokens</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-return" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- YOU -->
  <rect x="275" y="116" width="250" height="64" rx="12" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
  <text x="400" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">You (the DBA)</text>
  <text x="400" y="162" text-anchor="middle" font-size="11" fill="#0f6e56">Type questions in plain English</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="181" x2="400" y2="218" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- VS CODE -->
  <rect x="250" y="220" width="300" height="64" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="400" y="246" text-anchor="middle" font-size="14" font-weight="600" fill="#26215c">VS Code + Continue.dev</text>
  <text x="400" y="266" text-anchor="middle" font-size="11" fill="#3c3489">Agent mode · free extension</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="285" x2="400" y2="322" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OLLAMA -->
  <rect x="225" y="324" width="350" height="64" rx="12" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" font-size="14" font-weight="600" fill="#412402">Ollama — local AI engine</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#633806">Running Llama 3.2 3B locally</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="389" x2="400" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MCP BRIDGE -->
  <rect x="200" y="428" width="400" height="64" rx="12" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="400" y="454" text-anchor="middle" font-size="14" font-weight="600" fill="#4a1b0c">mssql-mcp bridge (.NET 9)</text>
  <text x="400" y="474" text-anchor="middle" font-size="11" fill="#712b13">Translates AI commands to T-SQL</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="493" x2="400" y2="530" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SQL SERVER -->
  <rect x="225" y="532" width="350" height="64" rx="12" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="400" y="558" text-anchor="middle" font-size="14" font-weight="600" fill="#042c53">SQL Server (local)</text>
  <text x="400" y="578" text-anchor="middle" font-size="11" fill="#0c447c">Read-only login · SELECT only</text>

  <!-- Return arrow right side -->
  <path d="M576 564 Q660 564 660 148 Q660 116 527 116" fill="none" stroke="#b4b2a9" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr-return)"/>
  <text x="688" y="350" text-anchor="middle" font-size="10" fill="#888780" transform="rotate(90 688 350)">answer returns to you</text>

  <!-- Step labels left side -->
  <circle cx="80" cy="148" r="16" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
  <text x="80" y="153" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">1</text>
  <circle cx="80" cy="252" r="16" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="80" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#26215c">2</text>
  <circle cx="80" cy="356" r="16" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
  <text x="80" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#412402">3</text>
  <circle cx="80" cy="460" r="16" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="80" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#4a1b0c">4</text>
  <circle cx="80" cy="564" r="16" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="80" y="569" text-anchor="middle" font-size="11" font-weight="600" fill="#042c53">5</text>

  <!-- Legend -->
  <rect x="30" y="680" width="740" height="30" rx="0" fill="#ffffff"/>
  <rect x="40" y="688" width="12" height="12" rx="3" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
  <text x="58" y="698" font-size="10" fill="#444441">You</text>
  <rect x="100" y="688" width="12" height="12" rx="3" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="118" y="698" font-size="10" fill="#444441">VS Code</text>
  <rect x="180" y="688" width="12" height="12" rx="3" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
  <text x="198" y="698" font-size="10" fill="#444441">Ollama (local AI)</text>
  <rect x="310" y="688" width="12" height="12" rx="3" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="328" y="698" font-size="10" fill="#444441">MCP Bridge</text>
  <rect x="420" y="688" width="12" height="12" rx="3" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="438" y="698" font-size="10" fill="#444441">SQL Server</text>
  <text x="620" y="698" font-size="10" fill="#888780">github.com/talkebsi/local-AI-DBA-Assistant</text>

</svg>
