<svg width="800" height="680" viewBox="0 0 800 680" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">What Llama Does Inside the MCP Setup</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6b6b6b">From your plain-English question to SQL results — 6 steps inside your laptop</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-ret" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LEFT COLUMN — Steps 1, 3, 5 (You / Bridge) -->
  <!-- Step 1: You type -->
  <rect x="40" y="80" width="280" height="68" rx="12" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
  <text x="55" y="104" font-size="11" font-weight="600" fill="#085041">STEP 1 — You type</text>
  <text x="55" y="122" font-size="12" font-weight="500" fill="#0f6e56">"show me slow queries"</text>
  <text x="55" y="140" font-size="10" fill="#1d9e75">Plain English in VS Code chat</text>

  <!-- Step 3: Bridge runs SQL -->
  <rect x="40" y="310" width="280" height="68" rx="12" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="55" y="334" font-size="11" font-weight="600" fill="#4a1b0c">STEP 4 — Bridge executes</text>
  <text x="55" y="352" font-size="12" font-weight="500" fill="#712b13">mssql-mcp runs T-SQL</text>
  <text x="55" y="370" font-size="10" fill="#993c1d">Against SQL Server (read-only)</text>

  <!-- Step 5: Raw results -->
  <rect x="40" y="428" width="280" height="68" rx="12" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="55" y="452" font-size="11" font-weight="600" fill="#4a1b0c">STEP 5 — Raw data returned</text>
  <text x="55" y="470" font-size="12" font-weight="500" fill="#712b13">Rows, numbers, data</text>
  <text x="55" y="488" font-size="10" fill="#993c1d">SQL Server responds to bridge</text>

  <!-- Step 6: Answer to you -->
  <rect x="40" y="546" width="280" height="68" rx="12" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
  <text x="55" y="570" font-size="11" font-weight="600" fill="#085041">STEP 6 — You see the answer</text>
  <text x="55" y="588" font-size="12" font-weight="500" fill="#0f6e56">Plain English + data</text>
  <text x="55" y="606" font-size="10" fill="#1d9e75">Explained in VS Code chat</text>

  <!-- RIGHT COLUMN — Llama steps -->
  <!-- Step 2: Llama reads schema -->
  <rect x="480" y="80" width="280" height="68" rx="12" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
  <text x="495" y="104" font-size="11" font-weight="600" fill="#412402">STEP 2 — Llama reads schema</text>
  <text x="495" y="122" font-size="12" font-weight="500" fill="#633806">ListTables / ListSchemas tools</text>
  <text x="495" y="140" font-size="10" fill="#ba7517">Knows your tables and columns</text>

  <!-- Step 3: Llama plans -->
  <rect x="480" y="194" width="280" height="68" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="495" y="218" font-size="11" font-weight="600" fill="#26215c">STEP 3 — Llama plans</text>
  <text x="495" y="236" font-size="12" font-weight="500" fill="#3c3489">Matches English to DMV pattern</text>
  <text x="495" y="254" font-size="10" fill="#534ab7">Decides which T-SQL to write</text>

  <!-- Step 4: Llama writes SQL -->
  <rect x="480" y="310" width="280" height="68" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="495" y="334" font-size="11" font-weight="600" fill="#26215c">STEP 3b — Llama writes SQL</text>
  <text x="495" y="352" font-size="12" font-weight="500" fill="#3c3489">SELECT from sys.dm_exec_...</text>
  <text x="495" y="370" font-size="10" fill="#534ab7">Sends to bridge via MCP protocol</text>

  <!-- Step 6: Llama explains -->
  <rect x="480" y="428" width="280" height="68" rx="12" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
  <text x="495" y="452" font-size="11" font-weight="600" fill="#412402">STEP 6 — Llama explains</text>
  <text x="495" y="470" font-size="12" font-weight="500" fill="#633806">Translates numbers to English</text>
  <text x="495" y="488" font-size="10" fill="#ba7517">Identifies the performance issue</text>

  <!-- ARROWS LEFT COLUMN -->
  <!-- Step 1 down to bridge -->
  <path d="M180 149 L180 195 L400 195 L400 115 L478 115" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Bridge to SQL -->
  <line x1="180" y1="379" x2="180" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Raw results up to Llama explains -->
  <line x1="322" y1="462" x2="478" y2="462" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Llama explains to answer -->
  <path d="M480 462 L400 462 L400 580 L322 580" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- ARROWS RIGHT COLUMN -->
  <!-- Schema to plan -->
  <line x1="620" y1="149" x2="620" y2="192" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Plan to write SQL -->
  <line x1="620" y1="263" x2="620" y2="308" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Write SQL to bridge (left) -->
  <line x1="478" y1="344" x2="322" y2="344" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>



  <!-- Column headers -->
  <rect x="100" y="56" width="160" height="20" rx="10" fill="#e1f5ee"/>
  <text x="180" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">You + Bridge + SQL Server</text>
  <rect x="540" y="56" width="160" height="20" rx="10" fill="#faeeda"/>
  <text x="620" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#412402">Llama (local AI brain)</text>

  <!-- Footer -->
  <line x1="40" y1="640" x2="760" y2="640" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="400" y="658" text-anchor="middle" font-size="10" fill="#888780">Everything runs locally via Ollama · No API calls · No cloud · github.com/talkebsi/local-ai-dba</text>

</svg>
